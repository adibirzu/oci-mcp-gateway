apiVersion: apps/v1
kind: Deployment
metadata:
  name: db-observatory
  namespace: oci-mcp
  labels:
    app: db-observatory
    tier: backend
    app.kubernetes.io/part-of: oci-mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: db-observatory
  template:
    metadata:
      labels:
        app: db-observatory
        tier: backend
    spec:
      serviceAccountName: oci-mcp-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-server
          image: eu-frankfurt-1.ocir.io/${OCIR_TENANCY}/db-observatory:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: MCP_TRANSPORT
              value: "streamable-http"
            - name: MCP_HOST
              value: "0.0.0.0"
            - name: MCP_PORT
              value: "8000"
            - name: OCI_AUTH_METHOD
              value: "resource_principal"
            - name: OCI_REGION
              value: "eu-frankfurt-1"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
      imagePullSecrets:
        - name: ocir-pull-secret
