apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-oci
  namespace: oci-mcp
  labels:
    app: mcp-oci
    tier: backend
    app.kubernetes.io/part-of: oci-mcp-gateway
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-oci
  template:
    metadata:
      labels:
        app: mcp-oci
        tier: backend
    spec:
      serviceAccountName: oci-mcp-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-server
          image: eu-frankfurt-1.ocir.io/${OCIR_TENANCY}/mcp-oci:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: OCI_MCP_TRANSPORT
              value: "streamable_http"
            - name: OCI_MCP_PORT
              value: "8000"
            - name: FASTMCP_HOST
              value: "0.0.0.0"
            - name: OCI_AUTH_METHOD
              value: "resource_principal"
            - name: OCI_REGION
              value: "eu-frankfurt-1"
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          resources:
            requests:
              memory: 256Mi
              cpu: 250m
            limits:
              memory: 512Mi
              cpu: 500m
      imagePullSecrets:
        - name: ocir-pull-secret
