# Template — populate with real values before applying.
# JWT public key: export from IDCS OAuth app → base64 encode
# Static token: generate with `openssl rand -hex 32`
apiVersion: v1
kind: Secret
metadata:
  name: oci-mcp-gateway-secrets
  namespace: oci-mcp
  labels:
    app: oci-mcp-gateway
type: Opaque
data:
  # base64-encoded PEM public key from IDCS
  jwt-public-key.pem: ""
  # base64-encoded static token for development/testing
  static-token: ""
