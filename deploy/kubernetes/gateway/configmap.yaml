apiVersion: v1
kind: ConfigMap
metadata:
  name: oci-mcp-gateway-config
  namespace: oci-mcp
  labels:
    app: oci-mcp-gateway
data:
  gateway.json: |
    {
      "name": "oci-mcp-gateway",
      "version": "1.0.0",
      "host": "0.0.0.0",
      "port": 9000,
      "path": "/mcp",
      "log_level": "INFO",
      "stateless": true,
      "auth": {
        "enabled": true,
        "jwt_public_key_file": "/etc/mcp-gateway/jwt-public-key.pem",
        "jwt_issuer": "https://idcs-${IDCS_DOMAIN_ID}.identity.oraclecloud.com/oauth2/v1",
        "jwt_audience": "oci-mcp-gateway",
        "jwt_algorithms": ["RS256"],
        "static_tokens": {},
        "required_scopes": [],
        "tool_scopes": {},
        "cors_origins": ["https://cp.octodemo.cloud", "https://ops.octodemo.cloud"]
      },
      "backends": [
        {
          "name": "logan",
          "description": "OCI Logging Analytics",
          "transport": "streamable_http",
          "url": "http://oci-logan.oci-mcp.svc.cluster.local:8000/mcp",
          "namespace_tools": true,
          "health_check_interval": 30
        },
        {
          "name": "oci",
          "description": "OCI Infrastructure",
          "transport": "streamable_http",
          "url": "http://mcp-oci.oci-mcp.svc.cluster.local:8000/mcp",
          "namespace_tools": true,
          "health_check_interval": 30
        },
        {
          "name": "security",
          "description": "OCI Security",
          "transport": "streamable_http",
          "url": "http://oci-mcp-security.oci-mcp.svc.cluster.local:8000/mcp",
          "namespace_tools": true,
          "health_check_interval": 30
        },
        {
          "name": "finops",
          "description": "Multicloud FinOps",
          "transport": "streamable_http",
          "url": "http://finopsai-mcp.oci-mcp.svc.cluster.local:8000/mcp",
          "namespace_tools": true,
          "health_check_interval": 30
        },
        {
          "name": "dbobs",
          "description": "Database Observatory",
          "transport": "streamable_http",
          "url": "http://db-observatory.oci-mcp.svc.cluster.local:8000/mcp",
          "namespace_tools": true,
          "health_check_interval": 30
        }
      ],
      "enable_audit_log": true,
      "enable_metrics": true
    }
